    - name: Install Jupyter
      run: |
        python -m pip install jupyter nbconvert
    
    - name: Run Jupyter notebooks for 2021C
      run: |
        cd "2021C原材料的订购与运输/python代码"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
