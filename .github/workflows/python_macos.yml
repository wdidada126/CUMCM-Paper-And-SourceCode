    - name: Run Python scripts for 2023A
      run: |
        cd "2023A定日镜场的优化设计/代码/代码"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python main1.py || echo "2023A main1 completed with warnings"
    
    - name: Run Python scripts for 2023B
      run: |
        cd "2023B多波束测线问题"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        ls *.py | head -5 | xargs -I {} python {} || echo "2023B scripts completed with warnings"
    
