      run: |
        cd "2020B穿越沙漠/python代码"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python code1.py || echo "2020B code1 completed with warnings"
        python code2.py || echo "2020B code2 completed with warnings"
    
    - name: Install CMake and build C++ projects for 2010C
      run: |
        brew install cmake
        cd "2010C-Oil-Pipeline-Layout"
        mkdir -p build
        cd build
        cmake ..
        make
        echo "2010C C++ projects built successfully"
    
    - name: Run C++ programs for 2010C
      run: |
        cd "2010C-Oil-Pipeline-Layout/build"
        ./company3_eval_2_1 || echo "2010C company3_eval_2_1 completed with warnings"
        ./company3_eval_3_1 || echo "2010C company3_eval_3_1 completed with warnings"
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true