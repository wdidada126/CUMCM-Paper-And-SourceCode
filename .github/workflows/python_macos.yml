# This workflow will install Python dependencies and run Python scripts for all folders
name: Python Application CI - macOS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
    
    - name: Run Python scripts for 2011B
      run: |
        cd "2011B交巡警服务平台"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python problem1_platform_allocation.py || echo "2011B script completed with warnings"
    
    - name: Run Python scripts for 2011D
      run: |
        cd "2011D天然肠衣搭配"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python natural_casing_optimization.py || echo "2011D script completed with warnings"
    
    - name: Run Python scripts for 2012A
      run: |
        cd "2012A葡萄酒评价"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python wine_evaluation_analysis.py || echo "2012A script completed with warnings"
    
    - name: Run Python scripts for 2012B
      run: |
        cd "2012B太阳能小屋设计"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python solar_house_design.py || echo "2012B script completed with warnings"
    
    - name: Run Python scripts for 2012D
      run: |
        cd "2012D机器人避障问题"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python robot_obstacle_avoidance.py || echo "2012D script completed with warnings"
    
    - name: Run Python scripts for 2013A
      run: |
        cd "2013A道路通行能力"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python traffic_capacity_analysis.py || echo "2013A script completed with warnings"
    
    - name: Run Python scripts for 2013C
      run: |
        cd "2013C古塔变形"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python pagoda_deformation_analysis.py || echo "2013C script completed with warnings"
    
    - name: Run Python scripts for 2013D
      run: |
        cd "2013D公共自行车系统"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python public_bicycle_system.py || echo "2013D script completed with warnings"
    
    - name: Run Python scripts for 2014C
      run: |
        cd "2014C生猪养殖管理"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
