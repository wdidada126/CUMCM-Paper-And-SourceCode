    - name: Run Python scripts for 2023B
      run: |
        cd "2023B多波束测线问题"
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
        Get-ChildItem *.py | Select-Object -First 5 | ForEach-Object { python $_.Name; if ($LASTEXITCODE -ne 0) { Write-Host "2023B script completed with warnings" } }
    
