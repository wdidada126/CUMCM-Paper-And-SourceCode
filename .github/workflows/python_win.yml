# This workflow will install Python dependencies and run Python scripts for all folders
name: Python Application CI - Windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
    
    - name: Run Python scripts for 2011B
      run: |
        cd "2011B交巡警服务平台"
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
        python problem1_platform_allocation.py; if ($LASTEXITCODE -ne 0) { Write-Host "2011B script completed with warnings" }
    
    - name: Run Python scripts for 2011D
      run: |
        cd "2011D天然肠衣搭配"
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
        python natural_casing_optimization.py; if ($LASTEXITCODE -ne 0) { Write-Host "2011D script completed with warnings" }
    
    - name: Run Python scripts for 2012A
      run: |
        cd "2012A葡萄酒评价"
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
        python wine_evaluation_analysis.py; if ($LASTEXITCODE -ne 0) { Write-Host "2012A script completed with warnings" }
    
    - name: Run Python scripts for 2012B
      run: |
